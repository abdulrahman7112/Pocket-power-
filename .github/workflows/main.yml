name: Build Pocket Option Bot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # تشغيل يدوي من GitHub

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:

    # ── 1. استنساخ الكود ──
    - name: Checkout code
      uses: actions/checkout@v3

    # ── 2. تثبيت Python ──
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # ── 3. تثبيت متطلبات النظام ──
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libffi-dev \
          libssl-dev \
          autoconf \
          libtool \
          pkg-config \
          libltdl-dev \
          libgmp-dev \
          zlib1g-dev \
          ccache

    # ── 4. تثبيت Buildozer + Cython ──
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0
        pip install Cython==0.29.37

    # ── 5. إعداد Android SDK/NDK (cache لتسريع البناء) ──
    - name: Cache Buildozer
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-

    # ── 6. بناء APK ──
    - name: Build APK
      run: |
        buildozer -v android debug 2>&1 | tee build.log

    # ── 7. رفع APK كـ Artifact قابل للتحميل ──
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: PocketOptionBot-APK
        path: bin/*.apk
        retention-days: 30

    # ── 8. رفع log إذا فشل البناء ──
    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: build-log
        path: build.log
